<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Marketplace</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

.hidden { display: none; }

.container {
    max-width: 500px;
    margin: auto;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

button {
    background: #ff0050;
    color: white;
    cursor: pointer;
}

.card {
    background: #222;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="auth">
    <h2>Login / Signup</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Login / Signup</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <h2>Welcome <span id="currentUser"></span></h2>
    <button onclick="logout()">Logout</button>

    <h3>Sell TikTok Account</h3>
    <input type="text" id="t_username" placeholder="TikTok Username">
    <input type="number" id="followers" placeholder="Followers">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="whatsapp" placeholder="WhatsApp Number">
    <button onclick="addAccount()">Add Listing</button>

    <h3>Marketplace</h3>
    <div id="accounts"></div>

</div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");

// DATABASES
let users = JSON.parse(localStorage.getItem("users")) || {};
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];

/* ---------------- LOGIN ---------------- */
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (!u || !p) return alert("Enter details");

    if (!users[u]) {
        users[u] = p; // signup
    }

    if (users[u] === p) {
        localStorage.setItem("currentUser", u);
        localStorage.setItem("users", JSON.stringify(users));
        location.reload();
    } else {
        alert("Wrong password");
    }
}

/* ---------------- LOGOUT ---------------- */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

/* ---------------- ADD LISTING ---------------- */
function addAccount() {
    const t_username = document.getElementById("t_username").value;
    const followers = document.getElementById("followers").value;
    const price = document.getElementById("price").value;
    const whatsapp = document.getElementById("whatsapp").value;

    if (!t_username || !followers || !price || !whatsapp) {
        return alert("Fill all fields");
    }

    accounts.push({
        owner: currentUser,
        username: t_username,
        followers,
        price,
        whatsapp
    });

    localStorage.setItem("accounts", JSON.stringify(accounts));
    render();
}

/* ---------------- RENDER MARKETPLACE ---------------- */
function render() {
    const div = document.getElementById("accounts");
    div.innerHTML = "";

    accounts.forEach((acc, i) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <b>@${acc.username}</b><br>
            Followers: ${acc.followers}<br>
            Price: $${acc.price}<br>
            Seller: ${acc.owner}<br>
        `;

        const btn = document.createElement("button");
        btn.innerText = "Contact on WhatsApp";
        btn.onclick = () => {
            window.open(`https://wa.me/${acc.whatsapp}`, "_blank");
        };

        card.appendChild(btn);

        if (acc.owner === currentUser) {
            const delBtn = document.createElement("button");
            delBtn.innerText = "Delete";
            delBtn.onclick = () => {
                accounts.splice(i, 1);
                localStorage.setItem("accounts", JSON.stringify(accounts));
                render();
            };
            card.appendChild(delBtn);
        }

        div.appendChild(card);
    });
}

/* ---------------- INIT ---------------- */
if (currentUser) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("currentUser").innerText = currentUser;
    render();
}
</script>

</body>
</html>
