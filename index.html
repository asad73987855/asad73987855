<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok Marketplace</title>

<style>
body {
    font-family: Arial;
    background: #111;
    color: white;
    padding: 20px;
}

/* PROFILE ICON */
.profile-icon {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #ff0050;
}

/* SUPPORT BUTTON */
.support-btn {
    position: fixed;
    bottom: 15px;
    left: 15px;
    background: #25D366;
    color: white;
    padding: 12px 15px;
    border-radius: 50px;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.hidden { display: none; }

.container {
    max-width: 500px;
    margin: auto;
}

input, button {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

button {
    background: #ff0050;
    color: white;
    cursor: pointer;
}

.btn-group {
    display: flex;
    gap: 10px;
}

.card {
    background: #222;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- PROFILE ICON -->
<img src="profile.jpg" class="profile-icon">

<!-- SUPPORT BUTTON -->
<div class="support-btn" onclick="openSupport()">
    💬 Support
</div>

<div class="container">

<!-- LOGIN / SIGNUP -->
<div id="auth">
    <h2>Login / Signup</h2>
    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <div class="btn-group">
        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <h2>Welcome <span id="currentUser"></span></h2>
    <button onclick="logout()">Logout</button>

    <h3>Sell TikTok Account</h3>
    <input type="text" id="t_username" placeholder="TikTok Username">
    <input type="text" id="link" placeholder="TikTok Account Link (required)">
    <input type="number" id="followers" placeholder="Followers">
    <input type="number" id="price" placeholder="Price">
    <input type="text" id="whatsapp" placeholder="WhatsApp Number">
    <button onclick="addAccount()">Add Listing</button>

    <h3>Marketplace</h3>
    <div id="accounts"></div>

</div>

</div>

<script>
let currentUser = localStorage.getItem("currentUser");

// DATABASES
let users = JSON.parse(localStorage.getItem("users")) || {};
let accounts = JSON.parse(localStorage.getItem("accounts")) || [];

/* ---------------- SUPPORT ---------------- */
function openSupport() {
    window.open("https://wa.me/923346138124", "_blank");
}

/* ---------------- SIGNUP ---------------- */
function signup() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (!u || !p) return alert("Enter details");

    if (users[u]) {
        return alert("Username already exists! Please login.");
    }

    users[u] = p;
    localStorage.setItem("users", JSON.stringify(users));
    localStorage.setItem("currentUser", u);

    alert("Account created successfully!");
    location.reload();
}

/* ---------------- LOGIN ---------------- */
function login() {
    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if (!u || !p) return alert("Enter details");

    if (!users[u]) {
        return alert("User not found! Please signup first.");
    }

    if (users[u] === p) {
        localStorage.setItem("currentUser", u);
        location.reload();
    } else {
        alert("Wrong password");
    }
}

/* ---------------- LOGOUT ---------------- */
function logout() {
    localStorage.removeItem("currentUser");
    location.reload();
}

/* ---------------- ADD LISTING ---------------- */
function addAccount() {
    const t_username = document.getElementById("t_username").value;
    const link = document.getElementById("link").value;
    const followers = document.getElementById("followers").value;
    const price = document.getElementById("price").value;
    const whatsapp = document.getElementById("whatsapp").value;

    if (!t_username || !followers || !price || !whatsapp || !link) {
        return alert("All fields including account link are required!");
    }

    if (!link.includes("tiktok.com")) {
        return alert("Enter a valid TikTok account link");
    }

    accounts.push({
        owner: currentUser,
        username: t_username,
        link,
        followers,
        price,
        whatsapp
    });

    localStorage.setItem("accounts", JSON.stringify(accounts));

    document.getElementById("t_username").value = "";
    document.getElementById("link").value = "";
    document.getElementById("followers").value = "";
    document.getElementById("price").value = "";
    document.getElementById("whatsapp").value = "";

    render();
}

/* ---------------- RENDER ---------------- */
function render() {
    const div = document.getElementById("accounts");
    div.innerHTML = "";

    accounts.forEach((acc, i) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <b>@${acc.username}</b><br>
            Followers: ${acc.followers}<br>
            Price: $${acc.price}<br>
            Seller: ${acc.owner}<br>
        `;

        const viewBtn = document.createElement("button");
        viewBtn.innerText = "View TikTok Account";
        viewBtn.onclick = () => {
            window.open(acc.link, "_blank");
        };
        card.appendChild(viewBtn);

        const waBtn = document.createElement("button");
        waBtn.innerText = "Contact on WhatsApp";
        waBtn.onclick = () => {
            window.open(`https://wa.me/${acc.whatsapp}`, "_blank");
        };
        card.appendChild(waBtn);

        if (acc.owner === currentUser) {
            const delBtn = document.createElement("button");
            delBtn.innerText = "Delete";
            delBtn.onclick = () => {
                accounts.splice(i, 1);
                localStorage.setItem("accounts", JSON.stringify(accounts));
                render();
            };
            card.appendChild(delBtn);
        }

        div.appendChild(card);
    });
}

/* ---------------- INIT ---------------- */
if (currentUser) {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("currentUser").innerText = currentUser;
    render();
}
</script>

</body>
</html>
